<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/cursed-timer-ulil">
        <!-- another option for scoreboard font <link rel="stylesheet" href="https://use.typekit.net/rkp8quu.css"> -->
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div class="container">
            <div class="box">
                <h3>HOME</h3>
                <div id="home-board">
                    <p id="home-score"></p>
                </div>
                <div class="btn-container">
                    <button class="btn-add" onclick="homeAddOne()">+1</button>
                    <button class="btn-add" onclick="homeAddTwo()">+2</button>
                    <button class="btn-add" onclick="homeAddThree()">+3</button>
                </div>
            </div>
            <div class="box">
                <h3>GUEST</h3>
                <div id="guest-board">
                    <p id="guest-score"></p>
                </div>
                <div class="btn-container">
                    <button class="btn-add" onclick="guestAddOne()">+1</button>
                    <button class="btn-add" onclick="guestAddTwo()">+2</button>
                    <button class="btn-add" onclick="guestAddThree()">+3</button>
                </div>
            </div>
            <button id="btn-new-game" onclick="startNewGame()" style="visibility: hidden">NEW GAME</button>
        </div>
        <script type="module" src="./index.js"></script>
    </body>
</html>
